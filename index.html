   <script>
    /* ---- GL setup, buffers, input, render loop ---- */
    let W,dv,wf;

    // Pre-allocated scratch arrays (zero per-frame allocation in render loop)
    const _camP=new Float32Array(3),_camF=new Float32Array(3),_camR=new Float32Array(3),_camU=new Float32Array(3);
    const _shipR=new Float32Array(3),_worldUp=new Float32Array([0,1,0]);
    const _toLW=new Float32Array(3),_toLV=new Float32Array(3);
    const _proj=new Float32Array(16),_view=new Float32Array(16),_vpMat=new Float32Array(16);
    const _model=new Float32Array(16),_mvp=new Float32Array(16),_t16=new Float32Array(16);
    const _normM=new Float32Array(9);
    const _mR=new Float32Array(3),_mMod=new Float32Array(16),_mMvp=new Float32Array(16),_mT16=new Float32Array(16),_mNorm=new Float32Array(9);
    const _aimLine=new Float32Array(6),_tgtMark=new Float32Array(12),_tgtDot=new Float32Array(3);
    const _trailBuf=new Float32Array(MISSILE_TRAIL_LEN*3);
    const _detAgeFlat=new Float32Array(6),_detPosFlat=new Float32Array(18);

    function cS(g,s,t){const sh=g.createShader(t);g.shaderSource(sh,s);g.compileShader(sh);if(!g.getShaderParameter(sh,g.COMPILE_STATUS)){console.error(g.getShaderInfoLog(sh));g.deleteShader(sh);return null}return sh}
    const vs=cS(gl,vsSource,gl.VERTEX_SHADER),fs=cS(gl,fsSource,gl.FRAGMENT_SHADER),pg=gl.createProgram();
    gl.attachShader(pg,vs);gl.attachShader(pg,fs);gl.linkProgram(pg);
    if(!gl.getProgramParameter(pg,gl.LINK_STATUS))console.error(gl.getProgramInfoLog(pg));
    gl.useProgram(pg);
    const bf=gl.createBuffer();gl.bindBuffer(gl.ARRAY_BUFFER,bf);
    gl.bufferData(gl.ARRAY_BUFFER,new Float32Array([-1,-1,1,-1,-1,1,1,1]),gl.STATIC_DRAW);
    const aP=gl.getAttribLocation(pg,'a_pos');gl.enableVertexAttribArray(aP);gl.vertexAttribPointer(aP,2,gl.FLOAT,false,0,0);
    const uR=gl.getUniformLocation(pg,'u_resolution'),uT=gl.getUniformLocation(pg,'u_time'),
      uCD=gl.getUniformLocation(pg,'u_camDist'),uSp=gl.getUniformLocation(pg,'u_spin'),
      uCP=gl.getUniformLocation(pg,'u_camPos'),uCF=gl.getUniformLocation(pg,'u_camFwd'),
      uCR=gl.getUniformLocation(pg,'u_camRight'),uCU=gl.getUniformLocation(pg,'u_camUp'),
      uRH=gl.getUniformLocation(pg,'u_rH'),uRI=gl.getUniformLocation(pg,'u_rIsco'),
      uHP=gl.getUniformLocation(pg,'u_hoveredPlanet'),
      uOS=gl.getUniformLocation(pg,'u_orbitScale'),
      uPl=[gl.getUniformLocation(pg,'u_planet0'),gl.getUniformLocation(pg,'u_planet1'),
           gl.getUniformLocation(pg,'u_planet2'),gl.getUniformLocation(pg,'u_planet3'),
           gl.getUniformLocation(pg,'u_planet4'),gl.getUniformLocation(pg,'u_planet5')];
    const uDetPos=[],uDetAge=[];
    for(let i=0;i<6;i++){uDetPos.push(gl.getUniformLocation(pg,'u_detPos['+i+']'));uDetAge.push(gl.getUniformLocation(pg,'u_detAge['+i+']'));}
    const uDetCount=gl.getUniformLocation(pg,'u_detCount');

    // Blackbody 1D lookup texture
    const uBB=gl.getUniformLocation(pg,'u_bbTex');
    {
      const N=256,d=new Uint8Array(N*4);
      function ss(e0,e1,x){const t=Math.max(0,Math.min(1,(x-e0)/(e1-e0)));return t*t*(3-2*t)}
      for(let i=0;i<N;i++){
        const t=i/(N-1);
        let r=ss(0,.15,t)*(1-.2*ss(.75,1,t));
        let g=ss(.05,.4,t)*(1-.15*ss(.8,1,t));
        let b=ss(.3,.75,t);
        const w=ss(.15,.4,t)*ss(.65,.35,t);r+=.15*w;g+=.06*w;
        const c=ss(.8,1,t);r+=.05*c;g+=.05*c;b+=.2*c;
        const m=1+.4*ss(.25,.55,t)*ss(.85,.55,t);r*=m;g*=m;b*=m;
        d[i*4]=Math.round(Math.min(r,1)*255);d[i*4+1]=Math.round(Math.min(g,1)*255);
        d[i*4+2]=Math.round(Math.min(b,1)*255);d[i*4+3]=255;
      }
      const tx=gl.createTexture();
      gl.activeTexture(gl.TEXTURE0);gl.bindTexture(gl.TEXTURE_2D,tx);
      gl.texImage2D(gl.TEXTURE_2D,0,gl.RGBA,N,1,0,gl.RGBA,gl.UNSIGNED_BYTE,d);
      gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_MIN_FILTER,gl.LINEAR);
      gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_MAG_FILTER,gl.LINEAR);
      gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_WRAP_S,gl.CLAMP_TO_EDGE);
      gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_WRAP_T,gl.CLAMP_TO_EDGE);
      gl.uniform1i(uBB,0);
    }

    /* ---- Ship shader program ---- */
    const sVS=cS(gl,shipVS,gl.VERTEX_SHADER),sFS=cS(gl,shipFS,gl.FRAGMENT_SHADER),shipPg=gl.createProgram();
    gl.attachShader(shipPg,sVS);gl.attachShader(shipPg,sFS);gl.linkProgram(shipPg);
    if(!gl.getProgramParameter(shipPg,gl.LINK_STATUS))console.error(gl.getProgramInfoLog(shipPg));
    const shipLocs={
      aPos:gl.getAttribLocation(shipPg,'a_shipPos'),
      aNorm:gl.getAttribLocation(shipPg,'a_shipNormal'),
      uMvp:gl.getUniformLocation(shipPg,'u_mvp'),
      uNorm:gl.getUniformLocation(shipPg,'u_normalMatrix'),
      uColor:gl.getUniformLocation(shipPg,'u_shipColor'),
      uLight:gl.getUniformLocation(shipPg,'u_lightDir')
    };
    const shipGeo=createBoxGeometry(SHIP_HALF[0],SHIP_HALF[1],SHIP_HALF[2]);
    const shipPosBuf=gl.createBuffer();gl.bindBuffer(gl.ARRAY_BUFFER,shipPosBuf);
    gl.bufferData(gl.ARRAY_BUFFER,shipGeo.positions,gl.STATIC_DRAW);
    const shipNrmBuf=gl.createBuffer();gl.bindBuffer(gl.ARRAY_BUFFER,shipNrmBuf);
    gl.bufferData(gl.ARRAY_BUFFER,shipGeo.normals,gl.STATIC_DRAW);
    const shipIdxBuf=gl.createBuffer();gl.bindBuffer(gl.ELEMENT_ARRAY_BUFFER,shipIdxBuf);
    gl.bufferData(gl.ELEMENT_ARRAY_BUFFER,shipGeo.indices,gl.STATIC_DRAW);
    // Missile geometry
    const missileGeo=createBoxGeometry(MISSILE_HALF[0],MISSILE_HALF[1],MISSILE_HALF[2]);
    const missilePosBuf=gl.createBuffer();gl.bindBuffer(gl.ARRAY_BUFFER,missilePosBuf);
    gl.bufferData(gl.ARRAY_BUFFER,missileGeo.positions,gl.STATIC_DRAW);
    const missileNrmBuf=gl.createBuffer();gl.bindBuffer(gl.ARRAY_BUFFER,missileNrmBuf);
    gl.bufferData(gl.ARRAY_BUFFER,missileGeo.normals,gl.STATIC_DRAW);
    const missileIdxBuf=gl.createBuffer();gl.bindBuffer(gl.ELEMENT_ARRAY_BUFFER,missileIdxBuf);
    gl.bufferData(gl.ELEMENT_ARRAY_BUFFER,missileGeo.indices,gl.STATIC_DRAW);
    gl.bindBuffer(gl.ARRAY_BUFFER,bf);
    gl.bindBuffer(gl.ELEMENT_ARRAY_BUFFER,null);
    gl.useProgram(pg);

    /* ---- Trajectory shader program ---- */
    const tVS=cS(gl,trajVS,gl.VERTEX_SHADER),tFS=cS(gl,trajFS,gl.FRAGMENT_SHADER),trajPg=gl.createProgram();
    gl.attachShader(trajPg,tVS);gl.attachShader(trajPg,tFS);gl.linkProgram(trajPg);
    if(!gl.getProgramParameter(trajPg,gl.LINK_STATUS))console.error(gl.getProgramInfoLog(trajPg));
    const trajLocs={
      aPos:gl.getAttribLocation(trajPg,'a_trajPos'),
      uMvp:gl.getUniformLocation(trajPg,'u_trajMVP'),
      uPtSize:gl.getUniformLocation(trajPg,'u_trajPtSize'),
      uColor:gl.getUniformLocation(trajPg,'u_trajColor')
    };
    const trajBuf=gl.createBuffer();
    const aimLineBuf=gl.createBuffer();
    const targetMarkerBuf=gl.createBuffer();
    const missileTrailBuf=gl.createBuffer();

    const bin=Uint8Array.from(atob(WB),c=>c.charCodeAt(0));
    WebAssembly.instantiate(bin,{env:{sin:x=>Math.fround(Math.sin(x)),cos:x=>Math.fround(Math.cos(x)),sqrt:x=>Math.fround(Math.sqrt(x))}}).then(r=>{
      W=r.instance.exports;
      const mem=W.memory;
      dv=new DataView(mem.buffer);
      wf=W.frame;

          const m=missiles[mi];
          if(!m.alive)continue;
          v3cross(_mR,m.fwd,_worldUp);v3norm(_mR,_mR);
          mat4Model(m.pos,m.fwd,_worldUp,_mR,_mMod);
          mat4Mul(_view,_mMod,_mT16);
          mat4Mul(_proj,_mT16,_mMvp);
          mat3NormalFromMat4(_mT16,_mNorm);
          gl.uniformMatrix4fv(shipLocs.uMvp,false,_mMvp);
          gl.uniformMatrix3fv(shipLocs.uNorm,false,_mNorm);
          gl.uniform3f(shipLocs.uColor,MISSILE_COLOR[0],MISSILE_COLOR[1],MISSILE_COLOR[2]);
          gl.bindBuffer(gl.ARRAY_BUFFER,missilePosBuf);
          gl.enableVertexAttribArray(shipLocs.aPos);
          gl.vertexAttribPointer(shipLocs.aPos,3,gl.FLOAT,false,0,0);
          gl.bindBuffer(gl.ARRAY_BUFFER,missileNrmBuf);
          gl.enableVertexAttribArray(shipLocs.aNorm);
          gl.vertexAttribPointer(shipLocs.aNorm,3,gl.FLOAT,false,0,0);
          gl.bindBuffer(gl.ELEMENT_ARRAY_BUFFER,missileIdxBuf);
          gl.drawElements(gl.TRIANGLES,36,gl.UNSIGNED_SHORT,0);
          gl.disableVertexAttribArray(shipLocs.aPos);
          gl.disableVertexAttribArray(shipLocs.aNorm);
          gl.bindBuffer(gl.ELEMENT_ARRAY_BUFFER,null);
        }

        aimDir=computeAimDir(mSX,mSY,_camP,_camF,_camR,_camU,fovY,aspect);

        gl.useProgram(trajPg);
        gl.enable(gl.BLEND);
        gl.blendFunc(gl.SRC_ALPHA,gl.ONE_MINUS_SRC_ALPHA);
        gl.uniformMatrix4fv(trajLocs.uMvp,false,_vpMat);
        gl.uniform1f(trajLocs.uPtSize,2.0);

        const n1=simulateTrajectory(flyPos,flyVel,simTime,TRAJ_STEPS,TRAJ_SIM_DT,trajArray,null,0,0);
        gl.bindBuffer(gl.ARRAY_BUFFER,trajBuf);
        gl.bufferData(gl.ARRAY_BUFFER,trajArray.subarray(0,n1*3),gl.DYNAMIC_DRAW);
        gl.enableVertexAttribArray(trajLocs.aPos);
        gl.vertexAttribPointer(trajLocs.aPos,3,gl.FLOAT,false,0,0);
        gl.uniform4f(trajLocs.uColor,0.235,0.549,1.0,0.3);
        gl.drawArrays(gl.POINTS,0,n1);

        if(aimDir){
          const lineLen=thrustPower*0.5;
          _aimLine[0]=flyPos[0];_aimLine[1]=flyPos[1];_aimLine[2]=flyPos[2];
          _aimLine[3]=flyPos[0]+aimDir[0]*lineLen;_aimLine[4]=flyPos[1];_aimLine[5]=flyPos[2]+aimDir[2]*lineLen;
          gl.bindBuffer(gl.ARRAY_BUFFER,aimLineBuf);
          gl.bufferData(gl.ARRAY_BUFFER,_aimLine,gl.DYNAMIC_DRAW);
          gl.vertexAttribPointer(trajLocs.aPos,3,gl.FLOAT,false,0,0);
          gl.uniform4f(trajLocs.uColor,0.549,0.863,1.0,0.7);
          gl.uniform1f(trajLocs.uPtSize,1.0);
          gl.drawArrays(gl.LINES,0,2);
        }

        for(let mi=0;mi<missiles.length;mi++){
          const m=missiles[mi];
          if(m.trailCount<2)continue;
          let tc=0;
          for(let j=0;j<m.trailCount;j+=2){
            const idx=((m.trailHead-m.trailCount+j+MISSILE_TRAIL_LEN)%MISSILE_TRAIL_LEN)*3;
            _trailBuf[tc++]=m.trail[idx];_trailBuf[tc++]=m.trail[idx+1];_trailBuf[tc++]=m.trail[idx+2];
          }
          if(tc>=3){
            gl.bindBuffer(gl.ARRAY_BUFFER,missileTrailBuf);
            gl.bufferData(gl.ARRAY_BUFFER,_trailBuf.subarray(0,tc),gl.DYNAMIC_DRAW);
            gl.vertexAttribPointer(trajLocs.aPos,3,gl.FLOAT,false,0,0);
            gl.uniform4f(trajLocs.uColor,0.85,0.5,0.2,0.5);
            gl.uniform1f(trajLocs.uPtSize,2.0);
            gl.drawArrays(gl.POINTS,0,tc/3);
          }
        }

        for(let ti=0;ti<missileTargets.length;ti++){
          const tgt=missileTargets[ti];
          _tgtMark[0]=tgt.x-1.5;_tgtMark[1]=0;_tgtMark[2]=tgt.z-1.5;
          _tgtMark[3]=tgt.x+1.5;_tgtMark[4]=0;_tgtMark[5]=tgt.z+1.5;
          _tgtMark[6]=tgt.x-1.5;_tgtMark[7]=0;_tgtMark[8]=tgt.z+1.5;
          _tgtMark[9]=tgt.x+1.5;_tgtMark[10]=0;_tgtMark[11]=tgt.z-1.5;
          gl.bindBuffer(gl.ARRAY_BUFFER,targetMarkerBuf);
          gl.bufferData(gl.ARRAY_BUFFER,_tgtMark,gl.DYNAMIC_DRAW);
          gl.vertexAttribPointer(trajLocs.aPos,3,gl.FLOAT,false,0,0);
          gl.uniform4f(trajLocs.uColor,0.85,0.35,0.15,0.8);
          gl.uniform1f(trajLocs.uPtSize,6.0);
          gl.drawArrays(gl.LINES,0,4);
          _tgtDot[0]=tgt.x;_tgtDot[1]=0;_tgtDot[2]=tgt.z;
          gl.bufferData(gl.ARRAY_BUFFER,_tgtDot,gl.DYNAMIC_DRAW);
          gl.drawArrays(gl.POINTS,0,1);
        }

        gl.disableVertexAttribArray(trajLocs.aPos);
        gl.disable(gl.BLEND);
        gl.disable(gl.DEPTH_TEST);
        gl.useProgram(pg);
        gl.bindBuffer(gl.ARRAY_BUFFER,bf);
        gl.enableVertexAttribArray(aP);
        gl.vertexAttribPointer(aP,2,gl.FLOAT,false,0,0);
      }
      if(flyMode){
        for(let i=0;i<6;i++)pL[i].classList.remove('visible','hovered');
        flySpdEl.textContent=v3len(flyVel).toFixed(1);
        flyPosEl.textContent=flyPos[0].toFixed(0)+', '+flyPos[1].toFixed(0)+', '+flyPos[2].toFixed(0);
        const tFrac=(thrustPower-THRUST_MIN)/(THRUST_MAX-THRUST_MIN);
        thrustValEl.textContent=thrustPower.toFixed(1);
        thrustHandle.style.left=(tFrac*180)+'px';
        thrustFill.style.width=(tFrac*100)+'%';
        if(bulletTime)flyBulletTime.classList.add('active');
        else flyBulletTime.classList.remove('active');
        updateMissileUI();
      }else{
        for(let i=0;i<6;i++){const b=0x0B8+i*12,sx=dv.getFloat32(b,true),sy=dv.getFloat32(b+4,true),dp=dv.getFloat32(b+8,true),lb=pL[i];
          if(dp>0&&sx>-100&&sx<baseWidth+100&&sy>-100&&sy<baseHeight+100){const ar=(planetData[i].radius/dp)*Math.min(baseWidth,baseHeight)*1.8;lb.style.transform='translate(calc('+sx+'px - 50%),'+(sy-ar-12)+'px)';lb.classList.add('visible')}else{lb.classList.remove('visible')}
          if(i===hP)lb.classList.add('hovered');else lb.classList.remove('hovered');
        }
      }
      fC++;if(now-lFT>=500){const fps=fC/(now-lFT)*1000;hF.textContent=Math.round(fps);hS.textContent=sp.toFixed(3);hD.textContent=(flyMode?flyDist:camDist).toFixed(1)+' M';hSc.textContent=renderScale<0.99?Math.round(renderScale*100)+'% RES':'';fC=0;lFT=now}
      requestAnimationFrame(render);
    }
   </script>
 </body>
