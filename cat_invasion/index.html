<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cat Invasion - Tower Rescue</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0a1a;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      font-family: sans-serif;
    }
    h1 {
      color: #FFD700;
      font-size: 24px;
      letter-spacing: 3px;
      margin-bottom: 8px;
      text-shadow: 0 0 12px rgba(255,215,0,0.4);
    }
    canvas {
      border: 3px solid #444;
      border-radius: 4px;
      display: block;
    }
    .controls {
      color: #aaa;
      font-size: 12px;
      margin-top: 8px;
    }
    .back-link {
      position: fixed;
      top: 12px;
      left: 16px;
      color: rgba(60,140,255,0.8);
      text-decoration: none;
      font-size: 14px;
      font-family: monospace;
      letter-spacing: 1px;
      z-index: 100;
    }
    .back-link:hover { color: rgba(60,140,255,1); }
  </style>
</head>
<body>
  <a class="back-link" href="../index.html">&larr; Back to Menu</a>
  <h1>CAT INVASION</h1>
  <canvas id="gameCanvas" width="800" height="600"></canvas>
  <div class="controls">
    Arrow Keys / WASD to move &amp; jump &nbsp;|&nbsp; SPACE to attack &nbsp;|&nbsp; ENTER to start / continue
  </div>
  <script src="game.js"></script>
</body>
</html>
